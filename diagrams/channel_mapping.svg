<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI,Arial,sans-serif">
  <rect width="900" height="420" fill="#1a1a2e" rx="12"/>
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">Refoss EM06P CT Clamp Channel Mapping (Bi-Phase)</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#888">Distribution Panel Wiring Confirmed from physical installation</text>
  <rect x="350" y="60" width="200" height="50" fill="#FF8C00" rx="8" stroke="#cc7000" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Refoss EM06P</text>
  <text x="450" y="98" text-anchor="middle" font-size="9" fill="#fff">192.168.1.82 | 6 CT Channels</text>
  <text x="170" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#aaa">PRIMARY CTs (1-3)</text>
  <rect x="50" y="150" width="240" height="65" fill="#FFD700" rx="8" opacity="0.9"/>
  <text x="170" y="172" text-anchor="middle" font-size="13" font-weight="700">A1 - Solar Phase A</text>
  <text x="170" y="190" text-anchor="middle" font-size="10">ch1 | em:1 | Red wire</text>
  <text x="170" y="205" text-anchor="middle" font-size="9" fill="#555">Positive when generating</text>
  <rect x="330" y="150" width="240" height="65" fill="#4ecdc4" rx="8" opacity="0.9"/>
  <text x="450" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">B1 - House Phase B</text>
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="#fff">ch2 | em:2 | Green wire</text>
  <text x="450" y="205" text-anchor="middle" font-size="9" fill="#ddd">Negative = consuming</text>
  <rect x="610" y="150" width="240" height="65" fill="#44bd7a" rx="8" opacity="0.7"/>
  <text x="730" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">C1 - Shower</text>
  <text x="730" y="190" text-anchor="middle" font-size="10" fill="#fff">ch3 | em:3 | Black wire</text>
  <text x="730" y="205" text-anchor="middle" font-size="9" fill="#ddd">House load (electric shower)</text>
  <text x="170" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#aaa">SECONDARY CTs (4-6)</text>
  <rect x="50" y="255" width="240" height="65" fill="#ff6b6b" rx="8" opacity="0.9"/>
  <text x="170" y="277" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">A2 - Grid Phase A</text>
  <text x="170" y="295" text-anchor="middle" font-size="10" fill="#fff">ch4 | em:4 | Red wire</text>
  <text x="170" y="310" text-anchor="middle" font-size="9" fill="#ddd">Neg=exporting, Pos=importing</text>
  <rect x="330" y="255" width="240" height="65" fill="#FFD700" rx="8" opacity="0.9"/>
  <text x="450" y="277" text-anchor="middle" font-size="13" font-weight="700">B2 - Solar Phase B</text>
  <text x="450" y="295" text-anchor="middle" font-size="10">ch5 | em:5 | Green wire</text>
  <text x="450" y="310" text-anchor="middle" font-size="9" fill="#555">May read negative (CT dir)</text>
  <rect x="610" y="255" width="240" height="65" fill="#ff6b6b" rx="8" opacity="0.9"/>
  <text x="730" y="277" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">C2 - Grid Phase B</text>
  <text x="730" y="295" text-anchor="middle" font-size="10" fill="#fff">ch6 | em:6 | Black wire</text>
  <text x="730" y="310" text-anchor="middle" font-size="9" fill="#ddd">Neg=exporting, Pos=importing</text>
  <rect x="50" y="345" width="800" height="65" fill="rgba(255,255,255,0.08)" rx="8" stroke="rgba(255,255,255,0.2)"/>
  <text x="450" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#FFD700">CALCULATIONS (all directly measured)</text>
  <text x="170" y="385" text-anchor="middle" font-size="11" fill="#FFD700" font-weight="600">Solar = A1 + |B2|</text>
  <text x="450" y="385" text-anchor="middle" font-size="11" fill="#ff6b6b" font-weight="600">Grid = A2 + C2</text>
  <text x="730" y="385" text-anchor="middle" font-size="11" fill="#4ecdc4" font-weight="600">House = |B1| + |C1|</text>
  <text x="450" y="403" text-anchor="middle" font-size="9" fill="#888">surplus = -Grid + currentMiningW | Negative grid = exporting | Active Power (W)</text>
</svg>